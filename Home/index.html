<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JgBtl | Bundeswehr Division</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* CSS direkt in der Datei, damit es sicher lädt */
        :root {
            --bw-green: #3e442d;
            --bw-accent: #6b705c;
            --bw-dark: #0f1108;
            --bw-card: #1a1c12;
            --text: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bw-dark);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(15, 17, 8, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { font-size: 1.3rem; font-weight: 800; text-transform: uppercase; }
        .logo b { color: var(--bw-green); }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .hero { padding: 100px 5%; max-width: 1200px; margin: 0 auto; }

        .badge {
            display: inline-block;
            background: var(--bw-green);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 20px;
        }

        h1 { font-size: 3rem; margin-bottom: 20px; text-transform: uppercase; }

        .btn {
            display: inline-flex;
            background: var(--bw-green);
            color: white;
            padding: 16px 32px;
            text-decoration: none;
            font-weight: 800;
            border-radius: 4px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .card {
            background: var(--bw-card);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card i { color: var(--bw-green); margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JgBtl<b>.DIVISION</b></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="fuhrpark.html">Fuhrpark</a>
            <a href="handbuch.html">Handbuch</a>
        </div>
    </nav>

    <section class="hero">
        <span class="badge">Einsatzstatus: Bereit</span>
        <h1>Jägerbataillon</h1>
        <p style="margin-bottom: 40px; opacity: 0.7;">Willkommen im digitalen Hauptquartier. Disziplin und Kameradschaft stehen an erster Stelle.</p>

        <a href="https://discord.gg/DM2Au3f6RS" class="btn">Jetzt Bewerben</a>

        <div class="bento-grid">
            <div class="card">
                <i data-lucide="truck"></i>
                <h3>Fuhrpark</h3>
                <p>Alle Fahrzeuge der Division.</p>
            </div>
            <div class="card">
                <i data-lucide="book-open"></i>
                <h3>Handbuch</h3>
                <p>Regeln und Funkcodes.</p>
            </div>
        </div>
    </section>

    <script>lucide.createIcons();</script>
</body>
</html>
